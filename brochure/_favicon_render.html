<!doctype html>
<html>
<head><meta charset="utf-8" />
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { width: 1024px; height: 1024px; }
  svg { width: 1024px; height: 1024px; display: block; }
</style>
</head>
<body>
  <!-- Instagram crops to a circle. Keep the O inside a safe circle
       with ~15% padding so nothing important gets clipped.
       Full-bleed teal background (no rounded corners) so there's no
       transparent corners to worry about. -->
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
    <rect width="1024" height="1024" fill="#0d9488"/>
    <text x="512" y="512"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="500"
          font-weight="700"
          fill="white"
          text-anchor="middle"
          dominant-baseline="central">O</text>
  </svg>
</body>
</html>
